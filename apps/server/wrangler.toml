name = "presento-server"
main = "src/workers.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# Non-sensitive vars — safe to commit.
# Secrets (tokens, client secrets, DB credentials) go in: wrangler secret put <NAME>
BACKEND_BASE_URL = "https://presento-server.<your-subdomain>.workers.dev"
TRUSTED_ORIGINS = "https://your-frontend.com"
PARTYKIT_SERVER_URL = "https://presento.<your-partykit-subdomain>.partykit.dev"
